services:
  router-service:
    build:
      context: .
      dockerfile: apps/router_service/Dockerfile
    container_name: router-service
    restart: unless-stopped
    ports:
      - "8300:8300"
    environment:
      ROUTER_SERVICE_BACKEND: router
      ROUTER_SERVICE_PRELOAD_MODEL: "false"
      ROUTER_SERVICE_TABLE_DETECTOR_BACKEND: protonx
      ROUTER_SERVICE_OCR_BACKEND: paddleocr_vietocr
      ROUTER_SERVICE_VL_BACKEND: paddleocr_vl
      ROUTER_SERVICE_ARTIFACT_ROOT: /var/lib/router-service/results
    volumes:
      - router_model_cache:/root/.paddlex
      - router_results:/var/lib/router-service/results
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8300/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  router_model_cache:
  router_results:

