services:
  vl-service:
    build:
      context: .
      dockerfile: apps/vl_service/Dockerfile.gpu
    container_name: vl-service-gpu
    ports:
      - "8100:8100"
    env_file:
      - apps/vl_service/.env
    environment:
      VL_SERVICE_BACKEND: paddleocr_vl
      VL_SERVICE_TABLE_DETECTOR_BACKEND: disabled
      VL_SERVICE_ARTIFACT_ROOT: /tmp/vl_service_artifacts
      VL_SERVICE_PRELOAD_MODEL: "false"
      VL_SERVICE_DISABLE_MODEL_SOURCE_CHECK: "true"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - vl_model_cache:/root/.paddlex
    gpus: all
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8100/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  vl_model_cache:
