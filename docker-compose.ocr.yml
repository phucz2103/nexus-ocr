services:
  ocr-service:
    build:
      context: .
      dockerfile: apps/ocr_service/Dockerfile
    container_name: ocr-service
    ports:
      - "8200:8200"
    env_file:
      - apps/ocr_service/.env
    environment:
      OCR_SERVICE_BACKEND: paddleocr
      OCR_SERVICE_ARTIFACT_ROOT: /tmp/ocr_service_artifacts
      OCR_SERVICE_DISABLE_MODEL_SOURCE_CHECK: "true"
    volumes:
      - ocr_model_cache:/root/.paddlex
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8200/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  ocr_model_cache:
